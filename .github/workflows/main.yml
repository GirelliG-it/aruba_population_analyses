name: CI for Aruba Population Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Conda
      uses: conda-incubator/setup-miniconda@v3
      with:
        # This tells the action to look for the file in the ROOT of the repo
        environment-file: environment.yml 
        activate-environment: aruba_env
        python-version: "3.10"
        auto-activate-base: false

    - name: Run Style Check (flake8)
      shell: bash -l {0}
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Structure and Logic Test
      shell: bash -l {0}
      run: |
        # Use the scripts folder we just verified with your .gitkeep files
        python scripts/test_pipeline.py
