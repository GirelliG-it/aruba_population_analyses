name: CI for Aruba Population Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: aruba-population-analysis
          auto-activate-base: false

      - name: Verify basic imports
        run: |
          python --version
          python - <<'PY'
          import matplotlib
          import openpyxl
          import pandas
          import pyarrow
          import pytest
          import scipy
          import seaborn
          import sklearn
          import sqlalchemy
          import statsmodels

          print("basic imports ok")
          PY

      - name: Compile Python files
        run: |
          python -m compileall config src scripts

      - name: Check pipeline CLI
        run: |
          python scripts/run_pipeline.py --help

      - name: Create fixture Excel file
        run: |
          python scripts/create_fixture_excel.py

      - name: Run pipeline against fixture data
        run: |
          python scripts/run_pipeline.py \
            --raw-dir tests/fixtures/raw \
            --output-dir tests/fixtures/processed \
            --input-file Demographic-aspects-2023.xlsx \
            --output-file demographic_aspects_2023.csv

      - name: Verify pipeline output
        run: |
          test -f tests/fixtures/processed/demographic_aspects_2023.csv
          python - <<'PY'
          from pathlib import Path

          import pandas as pd

          output_path = Path("tests/fixtures/processed/demographic_aspects_2023.csv")
          dataframe = pd.read_csv(output_path)

          if dataframe.empty:
              raise ValueError("Pipeline output CSV is empty.")

          print("pipeline output verified")
          PY
