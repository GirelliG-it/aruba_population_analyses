name: CI for Aruba Population Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: aruba-population-analysis
          auto-activate-base: false

      - name: Verify basic imports
        run: |
          python --version
          python - <<'PY'
          import matplotlib
          import openpyxl
          import pandas
          import pyarrow
          import pytest
          import scipy
          import seaborn
          import sklearn
          import sqlalchemy
          import statsmodels

          print("basic imports ok")
          PY

      - name: Compile Python files
        run: |
          python -m compileall config src scripts
